name: Publish to crates.io

on:
  release:
    types: [published]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish resonate-macros
        run: cargo publish --locked -p resonate-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index resonate-macros
        run: |
          version=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[] | select(.name=="resonate-macros") | .version')
          echo "Waiting for resonate-macros@${version} to appear on crates.io..."
          for i in $(seq 1 60); do
            if cargo search resonate-macros --limit 1 2>/dev/null \
                | grep -q "^resonate-macros = \"${version}\""; then
              echo "Indexed."
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for crates.io indexing." >&2
          exit 1

      - name: Publish resonate
        run: cargo publish --locked -p resonate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
